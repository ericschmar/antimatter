name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Validate
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check SemVer
        run: bun run version:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

