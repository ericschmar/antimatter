<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Settings</title>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body>
		<div class="window-shell">
			<header class="titlebar electrobun-webkit-app-region-drag">
				<div class="window-controls electrobun-webkit-app-region-no-drag">
					<button aria-label="Close window" class="window-control close" data-window-action="close" type="button"></button>
					<button aria-label="Minimize window" class="window-control minimize" data-window-action="minimize" type="button"></button>
					<button aria-label="Maximize window" class="window-control maximize" data-window-action="maximize" type="button"></button>
				</div>
				<div class="titlebar-title">Settings</div>
			</header>
			<main class="settings-window">
			<header class="settings-header">
				<div>
					<p>Antimatter</p>
					<h1>Settings</h1>
				</div>
				<button id="close-settings" type="button">Done</button>
			</header>

			<section>
				<h2>Appearance</h2>
				<label>
					<span>Font</span>
					<select id="font-family">
						<option value="system">System</option>
					</select>
				</label>
				<label>
					<span>Font size</span>
					<input id="font-size" max="18" min="12" step="1" type="number" />
				</label>
				<label>
					<span>Theme</span>
					<select id="theme">
						<option value="default">Default</option>
						<option value="light">Light</option>
						<option value="high-contrast">High contrast</option>
						<option value="warm">Warm</option>
					</select>
				</label>
				<label class="inline-setting">
					<input id="show-own-message-indicators" type="checkbox" />
					<span>Indicate my messages</span>
				</label>
				<label class="color-setting">
					<span>Indicator color</span>
					<input id="own-message-indicator-color" type="color" />
				</label>
				<label class="inline-setting">
					<input id="show-profile-pictures" type="checkbox" />
					<span>Show profile pictures</span>
				</label>
				<label class="inline-setting">
					<input id="use-new-composer" type="checkbox" />
					<span>Use new composer (beta)</span>
				</label>
			</section>

			<section>
				<h2>Notifications</h2>
				<label>
					<span>Notify me for</span>
					<select id="notification-preference">
						<option value="all">All messages</option>
						<option value="mentions">Mentions only</option>
						<option value="none">None</option>
					</select>
				</label>
				<label class="inline-setting">
					<input id="notification-sounds" type="checkbox" />
					<span>Play notification sounds</span>
				</label>
			</section>
			</main>
		</div>
		<script type="module" src="index.js"></script>
	</body>
</html>
